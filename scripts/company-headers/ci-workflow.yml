name: Company Headers Check

on:
  push:
    branches: [main, master, develop, staging]
  pull_request:
    branches: [main, master, develop, staging]

jobs:
  check-headers:
    runs-on: ubuntu-latest
    name: Check Company Headers

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq

      - name: Run company headers check
        run: |
          bash .github/scripts/check-headers.sh || exit 1

      - name: Upload results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: headers-check-results
          path: |
            headers-report.txt
